<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Chequeo de Extintores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#1b1815;
  --bg-elev:#221e1a;
  --card:#2a2521;
  --card-hover:#332d27;
  --border:#42392f;
  --text:#f2ece2;
  --text-muted:#a89a89;
  --burgundy:#7a2222;
  --burgundy-light:#a33636;
  --amber:#e0a53d;
  --green:#5c9c56;
  --green-dim:#3c5c3a;
  --red:#c14b3e;
  --red-dim:#5c342f;
  --gray-needle:#6b6157;
  --radius:12px;
  --radius-sm:8px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}

/* ---------- topbar ---------- */
.topbar{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--burgundy) 0%, #611a1a 100%);padding:16px 18px 14px;border-bottom:3px solid var(--amber);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:34px;height:34px;flex:none;}
.brand-text h1{font-family:'Oswald',sans-serif;font-size:19px;font-weight:600;letter-spacing:.3px;margin:0;text-transform:uppercase;}
.brand-text p{margin:1px 0 0;font-size:11.5px;color:#e9c9a8;letter-spacing:.5px;}
.topbar-row{display:flex;gap:8px;margin-top:12px;}
.topbar-row select, .topbar-row input{flex:1;background:#00000030;border:1px solid #ffffff30;color:#fff;border-radius:var(--radius-sm);padding:9px 10px;font-family:'Inter',sans-serif;font-size:13.5px;}
.topbar-row select option{color:#000;}

/* ---------- lista ---------- */
main{flex:1;padding:14px 14px 90px;}
.scan-fallback{background:var(--card);border:1px dashed var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:14px;}
.scan-fallback label{display:block;font-size:11.5px;color:var(--text-muted);margin-bottom:7px;}
.scan-fallback-row{display:flex;gap:8px;}
.scan-fallback-row input{flex:1;background:var(--bg-elev);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:9px 10px;font-family:'IBM Plex Mono',monospace;font-size:13px;text-transform:uppercase;}
.scan-fallback-row button{flex:none;background:var(--amber);border:none;color:#241c0f;font-weight:700;padding:0 18px;border-radius:var(--radius-sm);font-size:13px;}
.summary-strip{display:flex;gap:8px;margin-bottom:14px;}
.pill{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;}
.pill b{display:block;font-family:'IBM Plex Mono',monospace;font-size:20px;line-height:1.1;}
.pill span{font-size:10px;color:var(--text-muted);letter-spacing:.4px;text-transform:uppercase;}
.pill.total b{color:var(--text);}
.pill.done b{color:var(--green);}
.pill.pend b{color:var(--amber);}

.filters{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.chip{flex:none;padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text-muted);font-size:12.5px;font-weight:600;white-space:nowrap;}
.chip.active{background:var(--amber);color:#241c0f;border-color:var(--amber);}

.sector-group{margin-bottom:6px;}
.sector-title{font-family:'Oswald',sans-serif;font-size:12.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);margin:16px 2px 8px;}

.card{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:11px 12px;margin-bottom:8px;cursor:pointer;}
.card:active{background:var(--card-hover);}
.gauge{flex:none;}
.card-info{flex:1;min-width:0;}
.card-info .id{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:14px;color:var(--amber);}
.card-info .loc{font-size:12.5px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-status{flex:none;font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:4px 8px;border-radius:20px;}
.card-status.pend{background:#4a3a1e;color:var(--amber);}
.card-status.ok{background:var(--green-dim);color:#bfe3ba;}
.card-status.bad{background:var(--red-dim);color:#f3c6c0;}

.empty{text-align:center;color:var(--text-muted);padding:40px 10px;font-size:13.5px;}

/* ---------- form screen ---------- */
.form-header{padding:16px 18px;background:var(--bg-elev);border-bottom:1px solid var(--border);}
.back-btn{background:none;border:none;color:var(--amber);font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;padding:0;margin-bottom:10px;display:flex;align-items:center;gap:5px;cursor:pointer;}
.fx-title{display:flex;align-items:center;gap:12px;}
.fx-title .id{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:var(--amber);}
.fx-title .loc{font-size:13.5px;color:var(--text-muted);margin-top:2px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.info-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;}
.info-item span{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);}
.info-item b{font-size:13px;font-family:'IBM Plex Mono',monospace;font-weight:600;}

.section{padding:16px 18px 6px;}
.section-title{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--amber);margin:6px 0 10px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:13.5px;margin-bottom:7px;color:var(--text);}
.field input[type=text], .field input[type=number], .field input[type=date], .field textarea{
  width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);
  padding:10px 11px;font-family:'Inter',sans-serif;font-size:14px;
}
.field textarea{resize:vertical;min-height:64px;}

.toggle3{display:flex;gap:6px;}
.toggle3 button{flex:1;padding:11px 4px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text-muted);font-weight:700;font-size:12.5px;letter-spacing:.3px;}
.toggle3 button.sel-ok{background:var(--green-dim);color:#c9edc5;border-color:var(--green);}
.toggle3 button.sel-bad{background:var(--red-dim);color:#f6d0ca;border-color:var(--red);}
.toggle3 button.sel-na{background:#3a3630;color:#cfc6ba;border-color:var(--gray-needle);}

.estado-toggle{display:flex;gap:8px;}
.estado-toggle button{flex:1;padding:13px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--card);color:var(--text-muted);font-weight:700;font-size:13px;}
.estado-toggle button.op.sel{background:var(--green-dim);border-color:var(--green);color:#c9edc5;}
.estado-toggle button.nop.sel{background:var(--red-dim);border-color:var(--red);color:#f6d0ca;}

.save-bar{position:sticky;bottom:0;padding:14px 18px 20px;background:linear-gradient(180deg, transparent, var(--bg) 30%);}
.save-btn{width:100%;padding:15px;border:none;border-radius:var(--radius);background:var(--amber);color:#241c0f;font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;}
.save-btn:disabled{opacity:.5;}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--green-dim);color:#dff5db;border:1px solid var(--green);padding:11px 18px;border-radius:24px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .25s;z-index:50;}
.toast.show{opacity:1;}

/* ---------- export sheet ---------- */
.sheet-overlay{position:fixed;inset:0;background:#000000a0;display:flex;align-items:flex-end;z-index:40;}
.sheet{background:var(--bg-elev);width:100%;max-width:520px;margin:0 auto;border-radius:16px 16px 0 0;padding:20px 20px 26px;border-top:1px solid var(--border);}
.sheet h3{font-family:'Oswald',sans-serif;margin:0 0 14px;text-transform:uppercase;letter-spacing:.5px;font-size:15px;}
.sheet button.opt{width:100%;text-align:left;background:var(--card);border:1px solid var(--border);color:var(--text);padding:13px 14px;border-radius:var(--radius-sm);margin-bottom:8px;font-size:14px;}
.sheet .cancel{background:none;border:none;color:var(--text-muted);width:100%;padding:10px;font-size:13.5px;margin-top:4px;}

.fab{position:fixed;right:18px;bottom:20px;z-index:20;width:52px;height:52px;border-radius:50%;background:var(--amber);border:none;box-shadow:0 4px 14px #00000060;display:flex;align-items:center;justify-content:center;}
.fab.secondary{right:82px;background:var(--card);border:1px solid var(--border);}

/* ---------- admin ---------- */
.admin-header{padding:16px 18px;background:var(--bg-elev);border-bottom:1px solid var(--border);}
.add-btn{width:100%;padding:13px;border:1px dashed var(--amber);border-radius:var(--radius);background:transparent;color:var(--amber);font-weight:700;font-size:13.5px;margin-top:12px;}
.admin-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:11px 12px;margin-bottom:8px;}
.admin-row.inactive{opacity:.5;}
.admin-row .admin-info{flex:1;min-width:0;}
.admin-row .admin-info .id{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--amber);font-size:13.5px;}
.admin-row .admin-info .loc{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.admin-row .admin-actions{display:flex;gap:6px;flex:none;}
.icon-btn{width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-elev);color:var(--text-muted);display:flex;align-items:center;justify-content:center;}
.badge-baja{font-size:9.5px;text-transform:uppercase;font-weight:700;background:var(--red-dim);color:#f6d0ca;padding:2px 6px;border-radius:8px;margin-left:6px;}

.qr-preview{text-align:center;padding:20px 18px;}
.qr-preview #qrHolder{display:inline-block;background:#fff;padding:16px;border-radius:12px;margin:14px 0;}
.qr-preview .id-big{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;color:var(--amber);}
</style>
</head>

// --- MIGRACIÓN AL LOCALSTORAGE NATIVO PARA ARREGLAR ERROR DE GUARDADO ---
function getStorageKey(key) {
  return "extintores_app_" + key;
}

async function loadOverrides(){
  try{
    const r = localStorage.getItem(getStorageKey('master:overrides'));
    return r ? JSON.parse(r) : {};
  }catch(e){ return {}; }
}
async function saveOverrides(o){
  try{
    localStorage.setItem(getStorageKey('master:overrides'), JSON.stringify(o));
    return true;
  } catch(e){
    showToast('Error al guardar datos locales.');
    return false;
  }
}
async function loadCustom(){
  try{
    const r = localStorage.getItem(getStorageKey('master:custom'));
    return r ? JSON.parse(r) : [];
  }catch(e){ return []; }
}
async function saveCustom(c){
  try{
    localStorage.setItem(getStorageKey('master:custom'), JSON.stringify(c));
    return true;
  } catch(e){
    showToast('Error al guardar datos locales.');
    return false;
  }
}
async function loadInactive(){
  try{
    const r = localStorage.getItem(getStorageKey('master:inactive'));
    return r ? JSON.parse(r) : {};
  }catch(e){ return {}; }
}
async function saveInactive(i){
  try{
    localStorage.setItem(getStorageKey('master:inactive'), JSON.stringify(i));
    return true;
  } catch(e){
    showToast('Error al guardar datos locales.');
    return false;
  }
}
async function loadIdx(mes){
  try{
    const r = localStorage.getItem(getStorageKey('idx:'+mes));
    return r ? JSON.parse(r) : {};
  }catch(e){ return {}; }
}
async function saveIdx(mes, idx){
  try{
    localStorage.setItem(getStorageKey('idx:'+mes), JSON.stringify(idx));
    return true;
  }catch(e){ return false; }
}
async function loadInsp(mes, id){
  try{
    const r = localStorage.getItem(getStorageKey('insp:'+mes+':'+id));
    return r ? JSON.parse(r) : null;
  }catch(e){ return null; }
}
async function saveInsp(mes, id, data){
  try{
    localStorage.setItem(getStorageKey('insp:'+mes+':'+id), JSON.stringify(data));
    const idx = await loadIdx(mes);
    idx[id] = {estado: data.estado, ts: data.ts, inspector: data.inspector};
    await saveIdx(mes, idx);
    return true;
  }catch(e){
    showToast('Error al guardar la inspección.');
    return false;
  }
}

async function refreshMaster(){
  const [overrides, custom, inactive] = await Promise.all([loadOverrides(), loadCustom(), loadInactive()]);
  const base = MASTER.map(m => ({ ...m, ...(overrides[m.id]||{}), inactive: !!inactive[m.id] }));
  const extra = custom.map(c => ({ ...c, inactive: !!inactive[c.id] }));
  state.master = base.concat(extra);
  return state.master;
}

function getOuterSearchParams(){
  try{
    if(window.top && window.top !== window && window.top.location && window.top.location.search){
      return new URLSearchParams(window.top.location.search);
    }
  }catch(e){}
  return new URLSearchParams(window.location.search);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.innerText = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function buildMesOptions(){
  const res = []; const d = new Date();
  for(let i=0; i<6; i++){
    const m = d.getMonth() - i; const y = d.getFullYear();
    const nd = new Date(y, m, 1);
    const code = `${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}`;
    res.push(code);
  }
  return res;
}
function mesLabel(code){
  const [y, m] = code.split('-');
  const names = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return names[parseInt(m)-1] + ' ' + y;
}

  return `<svg class="gauge" width="${size}" height="${size}" viewBox="0 0 40 40">
    <path d="M4 20 A16 16 0 0 1 20 4" fill="none" stroke="#c14b3e" stroke-width="4" stroke-linecap="round"/>
    <path d="M20 4 A16 16 0 0 1 30.9 9.1" fill="none" stroke="#e0a53d" stroke-width="4" stroke-linecap="round"/>
    <path d="M30.9 9.1 A16 16 0 0 1 36 20" fill="none" stroke="#5c9c56" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${colors[status]}" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="20" cy="20" r="2.6" fill="${colors[status]}"/>
  </svg>`;
}

function statusOf(id){
  const rec = state.idx[id];
  if(!rec) return 'pend';
  return rec.estado === 'OPERATIVO' ? 'ok' : 'bad';
}

async function renderList(){
  state.idx = await loadIdx(state.mes);
  const view = document.getElementById('view');
  const activeMaster = state.master.filter(m=>!m.inactive);
  
  let done=0, pend=0, bad=0;
  activeMaster.forEach(x=>{
    const s = statusOf(x.id);
    if(s==='ok') done++; else if(s==='bad') bad++; else pend++;
  });

  const sectors = ['ALL'].concat([...new Set(activeMaster.map(x=>x.sector).filter(Boolean))]);
  const q = state.search.toLowerCase();
  const items = activeMaster.filter(m=>{
    if(state.statusFilter!=='ALL' && statusOf(m.id)!==(state.statusFilter==='OK'?'ok':(state.statusFilter==='BAD'?'bad':'pend'))) return false;
    if(state.sectorFilter!=='ALL' && m.sector!==state.sectorFilter) return false;
    if(q && !m.id.toLowerCase().includes(q) && !m.ubicacion.toLowerCase().includes(q) && !m.sector.toLowerCase().includes(q)) return false;
    return true;
  });

  let html = `
    <div class="scan-fallback">
      <label>¿El escaneo QR falló? Ingresá el código manualmente:</label>
      <div class="scan-fallback-row">
        <input type="text" id="manualCode" placeholder="Ej: A01" autocomplete="off">
        <button id="manualGo">Ir</button>
      </div>
    </div>
    <div class="summary-strip">
      <div class="pill total"><b>${activeMaster.length}</b><span>Totales</span></div>
      <div class="pill done"><b>${done}</b><span>Operativos</span></div>
      <div class="pill pend"><b>${pend}</b><span>Pendientes</span></div>
    </div>
    <div class="filters">
      ${[['ALL','Todos'],['PEND','Pendientes'],['OK','Operativos'],['BAD','No Op.']].map(([k,v])=>`<button class="chip ${state.statusFilter===k?'active':''}" data-f="${k}">${v}</button>`).join('')}
    </div>
    <div class="filters">
      ${sectors.map(s=>`<button class="chip ${state.sectorFilter===s?'active':''}" data-s="${s}">${s==='ALL'?'Todos los Sectores':s}</button>`).join('')}
    </div>
  `;

  if(!items.length){
    html += `<div class="empty">No se encontraron extintores que coincidan con el filtro.</div>`;
  } else {
    let lastSector = null;
    for(const m of items){
      if(m.sector !== lastSector){
        html += `<div class="sector-title">${m.sector||'Sin sector'}</div>`;
        lastSector = m.sector;
      }
      const st = statusOf(m.id);
      const statusLabel = st==='pend' ? 'Pendiente' : (st==='ok' ? 'Operativo' : 'No operativo');
      html += `<div class="card" data-id="${m.id}">
        ${gaugeSvg(st)}
        <div class="card-info">
          <div class="id">${m.id}</div>
          <div class="loc">${m.ubicacion}</div>
        </div>
        <div class="card-status ${st==='pend'?'pend':(st==='ok'?'ok':'bad')}">${statusLabel}</div>
      </div>`;
    }
  }
  view.innerHTML = html;

  const goToManual = ()=>{
    const code = document.getElementById('manualCode').value.trim();
    if(!code){ showToast('Ingresá un código'); return; }
    const found = state.master.find(x=>x.id.toLowerCase()===code.toLowerCase());
    if(!found){ showToast('No se encontró ese código'); return; }
    state.currentId = found.id; state.view = 'form'; renderForm();
  };
  document.getElementById('manualGo').addEventListener('click', goToManual);
  document.getElementById('manualCode').addEventListener('keydown', (e)=>{ if(e.key==='Enter') goToManual(); });

  view.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click', ()=>{ state.currentId = c.dataset.id; state.view = 'form'; renderForm(); });
  });
  document.getElementById('statusFilters').querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click', ()=>{ state.statusFilter = c.dataset.f; renderList(); });
  });
  document.getElementById('sectorFilters').querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click', ()=>{ state.sectorFilter = c.dataset.s; renderList(); });
  });
}

async function exportMes(mes){
  showToast('Generando planilla...');
  const idx = await loadIdx(mes);
  const rows = [];
  const header = ['ID','Mes','Inspector','Sector','N° Interno','N° de Recipiente','Ubicación','Año de fabricación', 'Clase de Fuego','Agente extintor','Capacidad Kg','¿Tiene señaletica? (Chapa baliza)', '¿Posee colgador para pared? (Soporte)','¿Tiene demarcación en el piso?', '¿Se encuentra en buenas condiciones el manometro?','¿El manómetro indica cargado? (zona verde).', '¿Se encuentra en buen estado general el extintor?','¿Se encuentra en buen estado el seguro?', '¿Las etiquetas son legibles?','¿Manguera en buen estado?','Vencimiento prueba hidraulica', 'Vencimiento de la carga','Estado (Operativo- No operativo)','Marca Extintor','Observaciones'];
  rows.push(header);
  
  let n=1;
  for(const m of state.master){
    const insp = idx[m.id] ? await loadInsp(mes, m.id) : null;
    rows.push([
      n++, mesLabel(mes), insp?insp.inspector:'', m.sector, m.id, m.recipiente, m.ubicacion, m.anio, m.clase, m.agente, m.capacidad,

    ]);
  }
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Reporte");
  XLSX.writeFile(wb, `Chequeo_Extintores_${mes}.xlsx`);
}

        doc.save(`QR_Extintor_${item.id}.pdf`);
      }
    }, 100);
  });
}

// --- FUNCIÓN PARA GENERAR TODOS LOS QR EN UN ÚNICO PDF ---
function descargarTodosLosQrPDF(){
  showToast('Generando catálogo de QRs...');
  setTimeout(async () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'mm', format:'a4'});
    const activeMaster = state.master.filter(m=>!m.inactive);
    const container = document.getElementById('hiddenQrContainer');

    let itemsProcessed = 0;
    // Configuramos cuadrícula de 2x3 por página
    const colWidth = 90; const rowHeight = 85;
    const startX = 15; const startY = 15;

    for (let i = 0; i < activeMaster.length; i++) {
      const ext = activeMaster[i];
      const pageIdx = itemsProcessed % 6;
      if (itemsProcessed > 0 && pageIdx === 0) { doc.addPage(); }

      const col = pageIdx % 2; const row = Math.floor(pageIdx / 2);
      const x = startX + (col * colWidth); const y = startY + (row * rowHeight);

      // Renderizar el QR transitoriamente
      container.innerHTML = '';
      const url = `${getBaseUrl()}?id=${encodeURIComponent(ext.id)}`;
      const qrObj = new QRCode(container, {text: url, width: 150, height: 150, colorDark: '#000000', colorLight: '#ffffff'});
      
      // Forzar lectura inmediata del canvas generado
      const canvas = container.querySelector('canvas');
      const imgData = canvas ? canvas.toDataURL('image/png') : null;

      // Dibujar recuadro de la etiqueta
      doc.setDrawColor(180); doc.setLineWidth(0.3);
      doc.rect(x, y, 85, 75);

      // Encabezado interno
      doc.setFillColor(122, 34, 34); doc.rect(x, y, 85, 10, 'F');
      doc.setTextColor(255, 236, 226); doc.setFont('Helvetica', 'bold'); doc.setFontSize(12);
      doc.text(`EXTINTOR ${ext.id}`, x + 4, y + 7);

      if (imgData) { doc.addImage(imgData, 'PNG', x + 20, y + 13, 45, 45); }

      // Texto descriptivo al pie
      doc.setTextColor(50); doc.setFont('Helvetica', 'normal'); doc.setFontSize(8);
      const ubiCortada = ext.ubicacion.length > 45 ? ext.ubicacion.substring(0,42)+'...' : ext.ubicacion;
      doc.text(ubiCortada, x + 4, y + 64);
      doc.setTextColor(120); doc.setFontSize(7);
      doc.text('Escanee para registrar inspección mensual', x + 4, y + 69);

      itemsProcessed++;
    }
    
    container.innerHTML = ''; // Limpiar el buffer temporal
    doc.save('Planilla_Codigos_QR_Completa.pdf');
    showToast('PDF de códigos generado ✓');
  }, 100);
}

function initMesSelect(){
  const sel = document.getElementById('mesSel');
  const opts = buildMesOptions();
  sel.innerHTML = opts.map(o=>`<option value="${o}" ${o===state.mes?'selected':''}>${mesLabel(o)}</option>`).join('');
  sel.addEventListener('change', ()=>{
    state.mes = sel.value;
    if(state.view==='list') renderList(); else renderForm();
  });
}

document.getElementById('searchInput').addEventListener('input', (e)=>{
  state.search = e.target.value;
  if(state.view==='list') renderList();
});
document.getElementById('exportFab').addEventListener('click', openExportSheet);
document.getElementById('adminFab').addEventListener('click', ()=>{ state.view='admin'; renderAdmin(); });

window.addEventListener('DOMContentLoaded', async ()=>{
  const opts = buildMesOptions(); state.mes = opts[0];
  initMesSelect();
  await refreshMaster();
  
  const params = getOuterSearchParams();
  const idQR = params.get('id');
  if(idQR){
    const found = state.master.find(x=>x.id.toLowerCase()===idQR.toLowerCase());
    if(found){ state.currentId = found.id; state.view = 'form'; renderForm(); return; }
  }
  renderList();
});
</script>
