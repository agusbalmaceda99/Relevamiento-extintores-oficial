<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Chequeo de Extintores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#1b1815;
  --bg-elev:#221e1a;
  --card:#2a2521;
  --card-hover:#332d27;
  --border:#42392f;
  --text:#f2ece2;
  --text-muted:#a89a89;
  --burgundy:#7a2222;
  --burgundy-light:#a33636;
  --amber:#e0a53d;
  --green:#5c9c56;
  --green-dim:#3c5c3a;
  --red:#c14b3e;
  --red-dim:#5c342f;
  --gray-needle:#6b6157;
  --radius:12px;
  --radius-sm:8px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}

/* ---------- topbar ---------- */
.topbar{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--burgundy) 0%, #611a1a 100%);padding:16px 18px 14px;border-bottom:3px solid var(--amber);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:34px;height:34px;flex:none;}
.brand-text h1{font-family:'Oswald',sans-serif;font-size:19px;font-weight:600;letter-spacing:.3px;margin:0;text-transform:uppercase;}
.brand-text p{margin:1px 0 0;font-size:11.5px;color:#e9c9a8;letter-spacing:.5px;}
.topbar-row{display:flex;gap:8px;margin-top:12px;}
.topbar-row select, .topbar-row input{flex:1;background:#00000030;border:1px solid #ffffff30;color:#fff;border-radius:var(--radius-sm);padding:9px 10px;font-family:'Inter',sans-serif;font-size:13.5px;}
.topbar-row select option{color:#000;}

/* ---------- lista ---------- */
main{flex:1;padding:14px 14px 90px;}
.scan-fallback{background:var(--card);border:1px dashed var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:14px;}
.scan-fallback label{display:block;font-size:11.5px;color:var(--text-muted);margin-bottom:7px;}
.scan-fallback-row{display:flex;gap:8px;}
.scan-fallback-row input{flex:1;background:var(--bg-elev);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:9px 10px;font-family:'IBM Plex Mono',monospace;font-size:13px;text-transform:uppercase;}
.scan-fallback-row button{flex:none;background:var(--amber);border:none;color:#241c0f;font-weight:700;padding:0 18px;border-radius:var(--radius-sm);font-size:13px;}
.summary-strip{display:flex;gap:8px;margin-bottom:14px;}
.pill{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;}
.pill b{display:block;font-family:'IBM Plex Mono',monospace;font-size:20px;line-height:1.1;}
.pill span{font-size:10px;color:var(--text-muted);letter-spacing:.4px;text-transform:uppercase;}
.pill.total b{color:var(--text);}
.pill.done b{color:var(--green);}
.pill.pend b{color:var(--amber);}

.filters{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.chip{flex:none;padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text-muted);font-size:12.5px;font-weight:600;white-space:nowrap;}
.chip.active{background:var(--amber);color:#241c0f;border-color:var(--amber);}

.sector-group{margin-bottom:6px;}
.sector-title{font-family:'Oswald',sans-serif;font-size:12.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);margin:16px 2px 8px;}

.card{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:11px 12px;margin-bottom:8px;cursor:pointer;}
.card:active{background:var(--card-hover);}
.gauge{flex:none;}
.card-info{flex:1;min-width:0;}
.card-info .id{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:14px;color:var(--amber);}
.card-info .loc{font-size:12.5px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-status{flex:none;font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:4px 8px;border-radius:20px;}
.card-status.pend{background:#4a3a1e;color:var(--amber);}
.card-status.ok{background:var(--green-dim);color:#bfe3ba;}
.card-status.bad{background:var(--red-dim);color:#f3c6c0;}

.empty{text-align:center;color:var(--text-muted);padding:40px 10px;font-size:13.5px;}

/* ---------- form screen ---------- */
.form-header{padding:16px 18px;background:var(--bg-elev);border-bottom:1px solid var(--border);}
.back-btn{background:none;border:none;color:var(--amber);font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;padding:0;margin-bottom:10px;display:flex;align-items:center;gap:5px;cursor:pointer;}
.fx-title{display:flex;align-items:center;gap:12px;}
.fx-title .id{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:var(--amber);}
.fx-title .loc{font-size:13.5px;color:var(--text-muted);margin-top:2px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.info-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;}
.info-item span{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);}
.info-item b{font-size:13px;font-family:'IBM Plex Mono',monospace;font-weight:600;}

.section{padding:16px 18px 6px;}
.section-title{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--amber);margin:6px 0 10px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:13.5px;margin-bottom:7px;color:var(--text);}
.field input[type=text], .field input[type=number], .field input[type=date], .field textarea{
  width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);
  padding:10px 11px;font-family:'Inter',sans-serif;font-size:14px;
}
.field textarea{resize:vertical;min-height:64px;}

.toggle3{display:flex;gap:6px;}
.toggle3 button{flex:1;padding:11px 4px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text-muted);font-weight:700;font-size:12.5px;letter-spacing:.3px;}
.toggle3 button.sel-ok{background:var(--green-dim);color:#c9edc5;border-color:var(--green);}
.toggle3 button.sel-bad{background:var(--red-dim);color:#f6d0ca;border-color:var(--red);}
.toggle3 button.sel-na{background:#3a3630;color:#cfc6ba;border-color:var(--gray-needle);}

.estado-toggle{display:flex;gap:8px;}
.estado-toggle button{flex:1;padding:13px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--card);color:var(--text-muted);font-weight:700;font-size:13px;}
.estado-toggle button.op.sel{background:var(--green-dim);border-color:var(--green);color:#c9edc5;}
.estado-toggle button.nop.sel{background:var(--red-dim);border-color:var(--red);color:#f6d0ca;}

.save-bar{position:sticky;bottom:0;padding:14px 18px 20px;background:linear-gradient(180deg, transparent, var(--bg) 30%);}
.save-btn{width:100%;padding:15px;border:none;border-radius:var(--radius);background:var(--amber);color:#241c0f;font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;}
.save-btn:disabled{opacity:.5;}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--green-dim);color:#dff5db;border:1px solid var(--green);padding:11px 18px;border-radius:24px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .25s;z-index:50;}
.toast.show{opacity:1;}

/* ---------- export sheet ---------- */
.sheet-overlay{position:fixed;inset:0;background:#000000a0;display:flex;align-items:flex-end;z-index:40;}
.sheet{background:var(--bg-elev);width:100%;max-width:520px;margin:0 auto;border-radius:16px 16px 0 0;padding:20px 20px 26px;border-top:1px solid var(--border);}
.sheet h3{font-family:'Oswald',sans-serif;margin:0 0 14px;text-transform:uppercase;letter-spacing:.5px;font-size:15px;}
.sheet button.opt{width:100%;text-align:left;background:var(--card);border:1px solid var(--border);color:var(--text);padding:13px 14px;border-radius:var(--radius-sm);margin-bottom:8px;font-size:14px;}
.sheet .cancel{background:none;border:none;color:var(--text-muted);width:100%;padding:10px;font-size:13.5px;margin-top:4px;}

.fab{position:fixed;right:18px;bottom:20px;z-index:20;width:52px;height:52px;border-radius:50%;background:var(--amber);border:none;box-shadow:0 4px 14px #00000060;display:flex;align-items:center;justify-content:center;}
.fab.secondary{right:82px;background:var(--card);border:1px solid var(--border);}

/* ---------- admin ---------- */
.admin-header{padding:16px 18px;background:var(--bg-elev);border-bottom:1px solid var(--border);}
.add-btn{width:100%;padding:13px;border:1px dashed var(--amber);border-radius:var(--radius);background:transparent;color:var(--amber);font-weight:700;font-size:13.5px;margin-top:12px;}
.admin-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:11px 12px;margin-bottom:8px;}
.admin-row.inactive{opacity:.5;}
.admin-row .admin-info{flex:1;min-width:0;}
.admin-row .admin-info .id{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--amber);font-size:13.5px;}
.admin-row .admin-info .loc{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.admin-row .admin-actions{display:flex;gap:6px;flex:none;}
.icon-btn{width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-elev);color:var(--text-muted);display:flex;align-items:center;justify-content:center;}
.badge-baja{font-size:9.5px;text-transform:uppercase;font-weight:700;background:var(--red-dim);color:#f6d0ca;padding:2px 6px;border-radius:8px;margin-left:6px;}

.qr-preview{text-align:center;padding:20px 18px;}
.qr-preview #qrHolder{display:inline-block;background:#fff;padding:16px;border-radius:12px;margin:14px 0;}
.qr-preview .id-big{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;color:var(--amber);}
</style>
</head>

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function currentMesKey(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function mesLabel(mesKey){
  const [y,m] = mesKey.split('-');
  return MESES[parseInt(m,10)-1]+' '+y;
}
function buildMesOptions(){
  const opts = [];
  const now = new Date();
  for(let i=2;i>=-9;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    opts.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
  }
  return [...new Set(opts)];
}

async function refreshMaster(){
  const [overrides, custom, inactive] = await Promise.all([loadOverrides(), loadCustom(), loadInactive()]);
  const base = MASTER.map(m => ({ ...m, ...(overrides[m.id]||{}), inactive: !!inactive[m.id] }));
  const extra = custom.map(c => ({ ...c, inactive: !!inactive[c.id] }));
  state.master = base.concat(extra);
  return state.master;
}

function getOuterSearchParams(){
  try{
    if(window.top && window.top !== window && window.top.location && window.top.location.search){
      return new URLSearchParams(window.top.location.search);
    }
  }catch(e){ }
  try{
    if(window.top && window.top !== window && window.top.location && window.top.location.hash){
      return new URLSearchParams(window.top.location.hash.replace(/^#/,''));
    }
  }catch(e){}
  return new URLSearchParams(location.search);
}

function showToast(msg){

  t.textContent = msg; t.classList.add('show');

}

async function loadIdx(mes){
  try{
    const r = await window.storage.get('idx:'+mes, true);
    return r ? JSON.parse(r.value) : {};
  }catch(e){ return {}; }
}
async function saveIdx(mes, idx){
  try{ await window.storage.set('idx:'+mes, JSON.stringify(idx), true); return true; }
  catch(e){ return false; }
}
async function loadInsp(mes, id){
  try{
    const r = await window.storage.get('insp:'+mes+':'+id, true);
    return r ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}
async function saveInsp(mes, id, data){
  try{
    await window.storage.set('insp:'+mes+':'+id, JSON.stringify(data), true);
    const idx = await loadIdx(mes);
    idx[id] = {estado: data.estado, ts: data.ts, inspector: data.inspector};
    await saveIdx(mes, idx);
    return true;
  }catch(e){
    showToast('No se pudo guardar. Abrí la app desde el link publicado.');
    return false;
  }
}

function gaugeSvg(status, size){
  size = size || 40;
  const colors = {pend:'#6b6157', ok:'#5c9c56', bad:'#c14b3e'};
  const needleAngle = status==='pend' ? 90 : (status==='ok' ? 35 : 145);
  const rad = (needleAngle-180) * Math.PI/180;
  const cx=20, cy=20, r=9;
  const x2 = cx + r*Math.cos(rad);
  const y2 = cy + r*Math.sin(rad);
  return `<svg class="gauge" width="${size}" height="${size}" viewBox="0 0 40 40">
    <path d="M4 20 A16 16 0 0 1 20 4" fill="none" stroke="#c14b3e" stroke-width="4" stroke-linecap="round"/>
    <path d="M20 4 A16 16 0 0 1 30.9 9.1" fill="none" stroke="#e0a53d" stroke-width="4" stroke-linecap="round"/>
    <path d="M30.9 9.1 A16 16 0 0 1 36 20" fill="none" stroke="#5c9c56" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${colors[status]}" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="20" cy="20" r="2.6" fill="${colors[status]}"/>
  </svg>`;
}

function statusOf(id){
  const rec = state.idx[id];
  if(!rec) return 'pend';
  return rec.estado === 'OPERATIVO' ? 'ok' : 'bad';
}

async function renderList(){
  state.idx = await loadIdx(state.mes);
  const view = document.getElementById('view');
  const activeMaster = state.master.filter(m=>!m.inactive);
  const sectors = [...new Set(activeMaster.map(m=>m.sector).filter(Boolean))];

  let items = activeMaster.filter(m=>{
    if(state.sectorFilter!=='todos' && m.sector!==state.sectorFilter) return false;
    const st = statusOf(m.id);
    if(state.statusFilter!=='todos' && st!==state.statusFilter) return false;
    if(state.search){
      const s = state.search.toLowerCase();
      if(!(m.id.toLowerCase().includes(s) || m.ubicacion.toLowerCase().includes(s) || m.sector.toLowerCase().includes(s))) return false;
    }
    return true;
  });

  const total = activeMaster.length;
  const done = activeMaster.filter(m=>state.idx[m.id]).length;
  const pend = total - done;

  let html = `
    <div class="scan-fallback">
      <label>¿Escaneaste un QR y no te abrió el extintor? Ingresá el código:</label>
      <div class="scan-fallback-row">
        <input type="text" id="manualCode" placeholder="ej: A01">
        <button id="manualGo">Ir</button>
      </div>
    </div>
    <div class="summary-strip">
      <div class="pill total"><b>${total}</b><span>Total</span></div>
      <div class="pill done"><b>${done}</b><span>Relevados</span></div>
      <div class="pill pend"><b>${pend}</b><span>Pendientes</span></div>
    </div>
    <div class="filters" id="statusFilters">
      <div class="chip ${state.statusFilter==='todos'?'active':''}" data-f="todos">Todos</div>
      <div class="chip ${state.statusFilter==='pend'?'active':''}" data-f="pend">Pendientes</div>
      <div class="chip ${state.statusFilter==='ok'?'active':''}" data-f="ok">Operativos</div>
      <div class="chip ${state.statusFilter==='bad'?'active':''}" data-f="bad">No operativos</div>
    </div>
    <div class="filters" id="sectorFilters">
      <div class="chip ${state.sectorFilter==='todos'?'active':''}" data-s="todos">Todos los sectores</div>
      ${sectors.map(s=>`<div class="chip ${state.sectorFilter===s?'active':''}" data-s="${s}">${s}</div>`).join('')}
    </div>
  `;

  if(items.length===0){
    html += `<div class="empty">No hay extintores que coincidan con el filtro.</div>`;
  } else {
    let lastSector = null;
    for(const m of items){
      if(m.sector !== lastSector){
        html += `<div class="sector-title">${m.sector||'Sin sector'}</div>`;
        lastSector = m.sector;
      }
      const st = statusOf(m.id);
      const statusLabel = st==='pend' ? 'Pendiente' : (st==='ok' ? 'Operativo' : 'No operativo');
      html += `<div class="card" data-id="${m.id}">
        ${gaugeSvg(st)}
        <div class="card-info">
          <div class="id">${m.id}</div>
          <div class="loc">${m.ubicacion}</div>
        </div>
        <div class="card-status ${st==='pend'?'pend':(st==='ok'?'ok':'bad')}">${statusLabel}</div>
      </div>`;
    }
  }
  view.innerHTML = html;

  const goToManual = ()=>{
    const code = document.getElementById('manualCode').value.trim();
    if(!code){ showToast('Ingresá un código'); return; }
    const found = state.master.find(x=>x.id.toLowerCase()===code.toLowerCase());
    if(!found){ showToast('No se encontró ese código'); return; }
    window.location.hash = found.id;
  };
  document.getElementById('manualGo').addEventListener('click', goToManual);
  document.getElementById('manualCode').addEventListener('keydown', (e)=>{ if(e.key==='Enter') goToManual(); });

  view.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click', ()=>{
      window.location.hash = c.dataset.id;
    });
  });
  document.getElementById('statusFilters').querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click', ()=>{ state.statusFilter = c.dataset.f; renderList(); });
  });
  document.getElementById('sectorFilters').querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click', ()=>{ state.sectorFilter = c.dataset.s; renderList(); });
  });
}

function fieldToggle3(key, current){
  const opts = [['OK','ok'],['NO OK','bad'],['N/A','na']];
  return `<div class="toggle3" data-key="${key}">
    ${opts.map(([v,cls])=>`<button type="button" data-v="${v}" class="${current===v?'sel-'+cls:''}">${v}</button>`).join('')}
  </div>`;
}

async function renderForm(){
  const m = state.master.find(x=>x.id===state.currentId);
  const view = document.getElementById('view');
  if(!m){ view.innerHTML = `<div class="empty">Extintor no encontrado.</div>`; return; }

  const existing = await loadInsp(state.mes, m.id);
  const d = existing || {};

  view.innerHTML = `
    <div class="form-header">
      <button class="back-btn" id="backBtn">&larr; Volver al listado</button>
      <div class="fx-title">
        ${gaugeSvg(existing ? (d.estado==='OPERATIVO'?'ok':'bad') : 'pend', 46)}
        <div>
          <div class="id">${m.id}</div>
          <div class="loc">${m.ubicacion}</div>
        </div>
      </div>
      <div class="info-grid">
        <div class="info-item"><span>Sector</span><b>${m.sector||'-'}</b></div>
        <div class="info-item"><span>N° recipiente</span><b>${m.recipiente||'-'}</b></div>
        <div class="info-item"><span>Año fabricación</span><b>${m.anio||'-'}</b></div>
        <div class="info-item"><span>Clase de fuego</span><b>${m.clase||'-'}</b></div>
        <div class="info-item"><span>Agente extintor</span><b>${m.agente||'-'}</b></div>
        <div class="info-item"><span>Capacidad</span><b>${m.capacidad?m.capacidad+' kg':'-'}</b></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Datos de la inspección</div>
      <div class="field">
        <label>Inspector</label>
        <input type="text" id="f_inspector" placeholder="Nombre y apellido" value="${d.inspector||''}">
      </div>
      <div class="field">
        <label>Marca extintor</label>
        <input type="text" id="f_marca" value="${d.marca!==undefined?d.marca:(m.marca||'')}">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Verificación</div>
      ${QUESTIONS.map(q=>`
        <div class="field">
          <label>${q.label}</label>
          ${fieldToggle3(q.key, d[q.key]||'')}
        </div>
      `).join('')}
    </div>

    <div class="section">
      <div class="section-title">Vencimientos</div>
      <div class="field">
        <label>Vencimiento prueba hidráulica (año)</label>
        <input type="number" id="f_vph" placeholder="ej: 2030" value="${d.vencHidraulica||''}">
      </div>
      <div class="field">
        <label>Vencimiento de la carga</label>
        <input type="date" id="f_vc" value="${d.vencCarga||''}">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Resultado</div>
      <div class="field">
        <div class="estado-toggle">
          <button type="button" class="op ${d.estado==='OPERATIVO'?'sel':''}" data-v="OPERATIVO">Operativo</button>
          <button type="button" class="nop ${d.estado==='NO OPERATIVO'?'sel':''}" data-v="NO OPERATIVO">No operativo</button>
        </div>
      </div>
      <div class="field">
        <label>Observaciones</label>
        <textarea id="f_obs" placeholder="Notas, recarga, reemplazo, etc.">${d.observaciones||''}</textarea>
      </div>
    </div>

    <div class="save-bar">
      <button class="save-btn" id="saveBtn">Guardar inspección</button>
    </div>
  `;

  document.getElementById('backBtn').addEventListener('click', ()=>{
    window.location.hash = '';
  });

  const toggles = {};
  QUESTIONS.forEach(q=>{ toggles[q.key] = d[q.key] || ''; });
  view.querySelectorAll('.toggle3').forEach(group=>{
    group.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const key = group.dataset.key;
        toggles[key] = btn.dataset.v;
        group.querySelectorAll('button').forEach(b=>b.className='');
        btn.className = btn.dataset.v==='OK'?'sel-ok':(btn.dataset.v==='NO OK'?'sel-bad':'sel-na');
      });
    });
  });

  let estadoVal = d.estado || '';
  const estadoBtns = view.querySelectorAll('.estado-toggle button');
  estadoBtns.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      estadoVal = btn.dataset.v;
      estadoBtns.forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
    });
  });

  document.getElementById('saveBtn').addEventListener('click', async ()=>{
    const inspector = document.getElementById('f_inspector').value.trim();
    if(!inspector){ showToast('Ingresá el nombre del inspector'); return; }
    if(!estadoVal){ showToast('Seleccioná el estado del extintor'); return; }

    const data = {
      inspector,
      marca: document.getElementById('f_marca').value.trim(),
      vencHidraulica: document.getElementById('f_vph').value,
      vencCarga: document.getElementById('f_vc').value,
      estado: estadoVal,
      observaciones: document.getElementById('f_obs').value.trim(),
      ts: new Date().toISOString(),
      ...toggles,
    };
    const ok = await saveInsp(state.mes, m.id, data);
    if(!ok) return;
    showToast('Inspección guardada ✓');
    setTimeout(()=>{
      window.location.hash = '';
    }, 700);
  });
}

async function exportMes(mes){
  showToast('Generando planilla...');
  const idx = await loadIdx(mes);
  const rows = [];
  const header = ['ID','Mes','Inspector','Sector','N° Interno','N° de Recipiente','Ubicación','Año de fabricación',
    'Clase de Fuego','Agente extintor','Capacidad Kg','¿Tiene señaletica? (Chapa baliza)',
    '¿Posee colgador para pared? (Soporte)','¿Tiene demarcación en el piso?',
    '¿Se encuentra en buenas condiciones el manometro?','¿El manómetro indica cargado? (zona verde).',
    '¿Se encuentra en buen estado general el extintor?','¿Se encuentra en buen estado el seguro?',
    '¿Las etiquetas son legibles?','¿Manguera en buen estado?','Vencimiento prueba hidraulica',
    'Vencimiento de la carga','Estado (Operativo- No operativo)','Marca Extintor','Observaciones'];
  rows.push(header);

  let n=1;
  for(const m of state.master){
    const insp = idx[m.id] ? await loadInsp(mes, m.id) : null;
    rows.push([
      n++, mesLabel(mes), insp?insp.inspector:'', m.sector, m.id, m.recipiente, m.ubicacion, m.anio, m.clase, m.agente, m.capacidad,
      insp?insp.senaletica:'', insp?insp.colgador:'', insp?insp.demarcacion:'', insp?insp.manometroCond:'',
      insp?insp.manometroCargado:'', insp?insp.estadoGeneral:'', insp?insp.seguro:'', insp?insp.etiquetas:'',
      insp?insp.manguera:'', insp?insp.vencHidraulica:'', insp?insp.vencCarga:'', insp?insp.estado:'',
      insp?insp.marca:m.marca, insp?insp.observaciones:''
    ]);
  }
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = header.map(()=>({wch:16}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, mesLabel(mes).slice(0,31));
  XLSX.writeFile(wb, `Chequeo_Extintores_${mesLabel(mes).replace(' ','_')}.xlsx`);
  showToast('Planilla descargada ✓');
}

function openExportSheet(){
  const overlay = document.createElement('div');
  overlay.className='sheet-overlay';
  const opts = buildMesOptions();
  overlay.innerHTML = `<div class="sheet">
    <h3>Exportar planilla</h3>
    ${opts.map(o=>`<button class="opt" data-m="${o}">${mesLabel(o)}</button>`).join('')}
    <button class="cancel" id="cancelSheet">Cancelar</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('.opt').forEach(b=>{
    b.addEventListener('click', ()=>{ exportMes(b.dataset.m); overlay.remove(); });
  });
  document.getElementById('cancelSheet').addEventListener('click', ()=>overlay.remove());
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.remove(); });
}

function adminFieldsHtml(item){
  item = item || {};
  return `
    <div class="field"><label>Código interno</label><input type="text" id="a_id" value="${item.id||''}" ${item.__editing?'disabled':''} placeholder="ej: T09"></div>
    <div class="field"><label>Sector</label><input type="text" id="a_sector" value="${item.sector||''}" placeholder="ej: Mantenimiento"></div>
    <div class="field"><label>Ubicación</label><input type="text" id="a_ubicacion" value="${item.ubicacion||''}" placeholder="ej: Taller interior"></div>
    <div class="field"><label>N° de recipiente</label><input type="text" id="a_recipiente" value="${item.recipiente||''}"></div>
    <div class="field"><label>Año de fabricación</label><input type="text" id="a_anio" value="${item.anio||''}"></div>
    <div class="field"><label>Clase de fuego</label><input type="text" id="a_clase" value="${item.clase||''}"></div>
    <div class="field"><label>Agente extintor</label><input type="text" id="a_agente" value="${item.agente||''}"></div>
    <div class="field"><label>Capacidad Kg</label><input type="text" id="a_capacidad" value="${item.capacidad||''}"></div>
    <div class="field"><label>Marca</label><input type="text" id="a_marca" value="${item.marca||''}"></div>
  `;
}
function readAdminFields(){
  return {
    id: document.getElementById('a_id').value.trim(),
    sector: document.getElementById('a_sector').value.trim(),
    ubicacion: document.getElementById('a_ubicacion').value.trim(),
    recipiente: document.getElementById('a_recipiente').value.trim(),
    anio: document.getElementById('a_anio').value.trim(),
    clase: document.getElementById('a_clase').value.trim(),
    agente: document.getElementById('a_agente').value.trim(),
    capacidad: document.getElementById('a_capacidad').value.trim(),
    marca: document.getElementById('a_marca').value.trim(),
  };
}

function getBaseUrl(){
  return location.origin + location.pathname;
}

function showQrPreview(item){
  const view = document.getElementById('view');
  view.innerHTML = `
    <div class="admin-header">
      <button class="back-btn" id="backFromQr">&larr; Volver</button>
      <div class="fx-title"><div><div class="id">${item.id}</div><div class="loc">Etiqueta QR lista para imprimir</div></div></div>
    </div>
    <div class="qr-preview">
      <div class="id-big">${item.id}</div>
      <div id="qrHolder"></div>
      <div style="color:var(--text-muted);font-size:13px;margin-bottom:16px;">${item.sector||''} · ${item.ubicacion||''}</div>
      <button class="save-btn" id="downloadLabelBtn" style="margin-bottom:10px;">Descargar etiqueta (PDF)</button>
    </div>
  `;
  const url = `${getBaseUrl()}#${encodeURIComponent(item.id)}`;
  new QRCode(document.getElementById('qrHolder'), {text:url, width:200, height:200, colorDark:'#1b1815', colorLight:'#ffffff'});

  document.getElementById('backFromQr').addEventListener('click', ()=>{ state.view='admin'; renderAdmin(); });
  document.getElementById('downloadLabelBtn').addEventListener('click', ()=>{
    setTimeout(()=>{
      const canvas = document.querySelector('#qrHolder canvas');
      const imgData = canvas ? canvas.toDataURL('image/png') : null;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({unit:'mm', format:'a4'});
      const qrSize = 50;
      const x = 20, y = 25;
      if(imgData) doc.addImage(imgData, 'PNG', x, y, qrSize, qrSize);
      doc.setFontSize(20);
      doc.text(item.id, x + qrSize + 8, y + 18);
      doc.setFontSize(11);
      doc.text(item.sector||'', x + qrSize + 8, y + 26);
      doc.setFontSize(9);
      const lines = doc.splitTextToSize(item.ubicacion||'', 70);
      doc.text(lines, x + qrSize + 8, y + 33);
      doc.setFontSize(8);
      doc.text('Escanear para chequeo mensual', x, y + qrSize + 8);
      doc.save(`QR_${item.id}.pdf`);
      showToast('Etiqueta descargada ✓');
    }, 150);
  });
}

async function renderAdmin(){
  await refreshMaster();
  const view = document.getElementById('view');
  const items = state.master.slice().sort((a,b)=> (a.inactive?1:0)-(b.inactive?1:0));
  view.innerHTML = `
    <div class="admin-header">
      <button class="back-btn" id="backFromAdmin">&larr; Volver al listado</button>
      <div class="fx-title"><div><div class="id">Administración</div><div class="loc">Editar, dar de baja o agregar extintores</div></div></div>
      <button class="add-btn" id="addNewBtn">+ Agregar extintor nuevo</button>
    </div>
    <div class="section" style="padding-top:14px;">
      ${items.map(m=>`
        <div class="admin-row ${m.inactive?'inactive':''}">
          <div class="admin-info">
            <div class="id">${m.id}${m.inactive?'<span class="badge-baja">Dado de baja</span>':''}</div>
            <div class="loc">${m.sector||'-'} · ${m.ubicacion||'-'}</div>
          </div>
          <div class="admin-actions">
            <button class="icon-btn" data-act="qr" data-id="${m.id}" title="Ver QR">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM19 14h2v2h-2zM14 19h2v2h-2zM19 19h2v2h-2z"/></svg>
            </button>
            <button class="icon-btn" data-act="edit" data-id="${m.id}" title="Editar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
            </button>
            <button class="icon-btn" data-act="toggle" data-id="${m.id}" title="${m.inactive?'Reactivar':'Dar de baja'}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${m.inactive?'<polyline points="1 4 1 10 7 10"/><path d="M3.5 15a9 9 0 1 0 2-9.4L1 10"/>':'<circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/>'}</svg>
            </button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  view.querySelectorAll('[data-act="qr"]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const item = state.master.find(x=>x.id===b.dataset.id);
      showQrPreview(item);
    });
  });
  view.querySelectorAll('[data-act="edit"]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const item = state.master.find(x=>x.id===b.dataset.id);
      renderEditForm(item, true);
    });
  });
  view.querySelectorAll('[data-act="toggle"]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const inactive = await loadInactive();
      if(inactive[b.dataset.id]) delete inactive[b.dataset.id]; else inactive[b.dataset.id] = true;
      await saveInactive(inactive);
      showToast(inactive[b.dataset.id] ? 'Extintor dado de baja' : 'Extintor reactivado');
      renderAdmin();
    });
  });
  document.getElementById('addNewBtn').addEventListener('click', ()=> renderEditForm(null, false));
  document.getElementById('backFromAdmin').addEventListener('click', ()=>{ window.location.hash = ''; });
}

function renderEditForm(item, editing){
  const view = document.getElementById('view');
  view.innerHTML = `
    <div class="admin-header">
      <button class="back-btn" id="backFromEdit">&larr; Volver</button>
      <div class="fx-title"><div><div class="id">${editing?('Editar '+item.id):'Extintor nuevo'}</div>
        <div class="loc">${editing?'Los datos se guardan como corrección sobre la planilla original.':'Se agrega a la lista y queda disponible para relevar.'}</div>
      </div></div>
    </div>
    <div class="section">${adminFieldsHtml(editing?{...item,__editing:true}:null)}</div>
    <div class="save-bar"><button class="save-btn" id="saveAdminBtn">${editing?'Guardar cambios':'Agregar extintor'}</button></div>
  `;
  document.getElementById('backFromEdit').addEventListener('click', ()=>{ state.view='admin'; renderAdmin(); });
  document.getElementById('saveAdminBtn').addEventListener('click', async ()=>{
    const fields = readAdminFields();
    if(!fields.id){ showToast('Ingresá el código interno'); return; }

    if(editing){
      const overrides = await loadOverrides();
      const { id, ...rest } = fields;
      overrides[item.id] = rest;
      const ok = await saveOverrides(overrides);
      if(!ok) return;
      showToast('Extintor actualizado ✓');
      state.view='admin'; await refreshMaster(); renderAdmin();
    } else {
      const exists = state.master.some(x=>x.id===fields.id);
      if(exists){ showToast('Ese código ya existe'); return; }
      const custom = await loadCustom();
      custom.push(fields);
      const ok = await saveCustom(custom);
      if(!ok) return;
      await refreshMaster();
      showToast('Extintor agregado ✓');
      const newItem = state.master.find(x=>x.id===fields.id);
      showQrPreview(newItem);
    }
  });
}

function initMesSelect(){
  const sel = document.getElementById('mesSel');
  const opts = buildMesOptions();
  sel.innerHTML = opts.map(o=>`<option value="${o}" ${o===state.mes?'selected':''}>${mesLabel(o)}</option>`).join('');
  sel.addEventListener('change', ()=>{
    state.mes = sel.value;
    if(state.view==='list') renderList(); else renderForm();
  });
}

// NUEVO ENRUTADOR INTELIGENTE POR HASH
async function route() {
  await refreshMaster();
  const hash = window.location.hash.replace('#', '').trim();
  
  if (hash.toLowerCase() === 'admin') {
    state.view = 'admin';
    renderAdmin();
    return;
  }
  
  if (hash) {
    const found = state.master.find(x => x.id.toLowerCase() === hash.toLowerCase());
    if (found) {
      state.currentId = found.id;
      state.view = 'form';
      renderForm();
      return;
    }
  }
  
  // Fallback por si venía con parámetro tradicional ?id=A01
  const params = getOuterSearchParams();
  if (params.get('id')) {
    const found = state.master.find(x => x.id.toLowerCase() === params.get('id').toLowerCase());
    if (found) {
      state.currentId = found.id;
      state.view = 'form';
      renderForm();
      return;
    }
  }
  
  state.view = 'list';
  state.currentId = null;
  renderList();
}

window.addEventListener('hashchange', route);

document.getElementById('searchInput').addEventListener('input', (e)=>{
  state.search = e.target.value;
  if(state.view==='list') renderList();
});

document.getElementById('exportFab').addEventListener('click', openExportSheet);
document.getElementById('adminFab').addEventListener('click', ()=>{ window.location.hash = 'admin'; });

const params = getOuterSearchParams();
if(params.get('mes')) { state.mes = params.get('mes'); }

initMesSelect();
route();
</script>
