<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Extintores</title>
    <!-- Tailwind CSS para diseño rápido y limpio -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Lucide Icons para los íconos modernos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Biblioteca para generar códigos QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Biblioteca para generar archivos Excel (.xlsx) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Biblioteca para generar PDF de impresión -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-24">

    <!-- ENCABEZADO -->
    <header class="bg-red-600 text-white shadow-md p-4 sticky top-0 z-10 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i data-lucide="shield-alert" class="w-6 h-6"></i>
            <h1 class="text-xl font-bold tracking-tight">Relevamiento Extintores</h1>
        </div>
        <span id="mes-actual" class="bg-red-700 px-3 py-1 rounded-full text-xs font-semibold"></span>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <!-- VISTA DE RELEVAMIENTO (FORMULARIO) -->
        <section id="vista-formulario" class="hidden bg-white p-5 rounded-2xl shadow-sm border border-gray-200 space-y-4">
            <div class="flex justify-between items-center border-b border-gray-100 pb-3">
                <div>
                    <h2 id="form-id" class="text-2xl font-black text-red-600">--</h2>
                    <p id="form-ubicacion" class="text-sm text-gray-500 font-medium">--</p>
                </div>
                <button onclick="volverALista()" class="text-gray-400 hover:text-gray-600 p-2">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <!-- Checklist -->
            <div class="space-y-3 pt-2">
                <label class="flex items-center justify-between p-3 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100 transition">
                    <span class="font-medium text-gray-700">1. Manómetro en rango verde</span>
                    <input type="checkbox" id="chk-manometro" class="w-5 h-5 accent-red-600 rounded">
                </label>
                <label class="flex items-center justify-between p-3 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100 transition">
                    <span class="font-medium text-gray-700">2. Precinto e muesca intactos</span>
                    <input type="checkbox" id="chk-precinto" class="w-5 h-5 accent-red-600 rounded">
                </label>
                <label class="flex items-center justify-between p-3 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100 transition">
                    <span class="font-medium text-gray-700">3. Manguera y boquilla sanas</span>
                    <input type="checkbox" id="chk-manguera" class="w-5 h-5 accent-red-600 rounded">
                </label>
                <label class="flex items-center justify-between p-3 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100 transition">
                    <span class="font-medium text-gray-700">4. Acceso despejado y visible</span>
                    <input type="checkbox" id="chk-acceso" class="w-5 h-5 accent-red-600 rounded">
                </label>
                <label class="flex items-center justify-between p-3 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100 transition">
                    <span class="font-medium text-gray-700">5. Tarjeta de control vigente</span>
                    <input type="checkbox" id="chk-tarjeta" class="w-5 h-5 accent-red-600 rounded">
                </label>
            </div>

            <!-- Observaciones -->
            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Observaciones / Comentarios</label>
                <textarea id="txt-observaciones" rows="2" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500" placeholder="Escribí acá si encontraste alguna anomalía..."></textarea>
            </div>

            <button onclick="guardarInspeccion()" class="w-full bg-red-600 text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-red-700 active:scale-[0.98] transition flex justify-center items-center gap-2">
                <i data-lucide="check-circle" class="w-5 h-5"></i> Guardar Registro
            </button>
        </section>

        <!-- VISTA DE LISTA GENERAL -->
        <section id="vista-lista" class="space-y-3">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider">Estado de Planta</h3>
                <span id="contador-progreso" class="text-xs font-bold bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full">0/0</span>
            </div>
            <div id="contenedor-extintores" class="space-y-2.5">
                <!-- Se autogenera con JS -->
            </div>
        </section>

        <!-- VISTA CONFIGURACIÓN INTERNA -->
        <section id="vista-config" class="hidden bg-white p-5 rounded-2xl shadow-sm border border-gray-200 space-y-4">
            <div class="flex justify-between items-center border-b border-gray-100 pb-3">
                <h2 class="text-lg font-bold text-gray-700 flex items-center gap-2">
                    <i data-lucide="settings" class="w-5 h-5 text-gray-500"></i> Panel de Gestión Interna
                </h2>
                <button onclick="volverALista()" class="text-gray-400 hover:text-gray-600 p-2">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block">Lista de Códigos QR</label>
                <div id="lista-descarga-qr" class="max-h-64 overflow-y-auto border border-gray-100 rounded-xl divide-y divide-gray-100">
                    <!-- Se llena dinámicamente -->
                </div>
            </div>

            <!-- UNICO BOTON AGREGADO ABAJO DE LA LISTA -->
            <button onclick="descargarTodosLosQrPDF()" class="w-full bg-gray-800 text-white font-bold py-3 rounded-xl shadow-md hover:bg-gray-900 transition flex justify-center items-center gap-2 text-sm mt-2">
                <i data-lucide="file-text" class="w-4 h-4"></i> Descargar Todos los QR juntos (PDF)
            </button>
        </section>
    </main>

    <!-- MENÚ DE NAVEGACIÓN FIJO (INFERIOR) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-xl px-6 py-2 flex justify-around items-center max-w-md mx-auto z-10">
        <button onclick="volverALista()" class="flex flex-col items-center text-red-600 gap-0.5">
            <i data-lucide="list-todo" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold">Relevamiento</span>
        </button>
        <button onclick="abrirConfiguracion()" class="flex flex-col items-center text-gray-400 hover:text-gray-600 gap-0.5">
            <i data-lucide="qr-code" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold">Panel QR</span>
        </button>
        <button onclick="exportarExcel()" class="flex flex-col items-center text-gray-400 hover:text-green-600 gap-0.5">
            <i data-lucide="download" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold">Bajar Excel</span>
        </button>
    </nav>

    <!-- Contenedores técnicos ocultos -->
    <div id="qr-oculto" class="hidden"></div>
    <div id="plantilla-pdf-impresion" class="hidden bg-white p-8 space-y-8 text-center" style="width: 700px;"></div>

    <!-- LOGICA DE LA APLICACIÓN -->
    <script>
        const extintoresBase = [
            { id: "A01", ubicacion: "Acceso Principal - Oficinas" },
            { id: "A02", ubicacion: "Pasillo Central Administrativo" },
            { id: "A03", ubicacion: "Sector Cómputos / Servidor" },
            { id: "P01", ubicacion: "Producción - Línea de Montaje 1" },
            { id: "P02", ubicacion: "Producción - Línea de Montaje 2" },
            { id: "P03", ubicacion: "Depósito de Materia Prima" },
            { id: "P04", ubicacion: "Taller de Mantenimiento Mecánico" },
            { id: "P05", ubicacion: "Sector Compresores" },
            { id: "P06", ubicacion: "Depósito de Producto Terminado" },
            { id: "E01", ubicacion: "Pañol de Herramientas" },
            { id: "E02", ubicacion: "Comedor de Personal" },
            { id: "E03", ubicacion: "Sector Tableros Eléctricos Principales" }
        ];

        let baseDatos = [];
        let idSeleccionado = null;
        let mesActualClave = "";

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            const fecha = new Date();
            const nombreMes = meses[fecha.getMonth()];
            mesActualClave = `${nombreMes}-${fecha.getFullYear()}`;
            document.getElementById('mes-actual').innerText = `${nombreMes.toUpperCase()} ${fecha.getFullYear()}`;

            const datosGuardados = localStorage.getItem(`inspecciones_${mesActualClave}`);
            if (datosGuardados) {
                baseDatos = JSON.parse(datosGuardados);
            } else {
                baseDatos = extintoresBase.map(e => ({
                    ...e,
                    inspeccionado: false,
                    fecha: "",
                    manometro: false,
                    precinto: false,
                    manguera: false,
                    acceso: false,
                    tarjeta: false,
                    observaciones: ""
                }));
            }

            renderizarLista();
            comprobarUrlQROpen();
        });

        function comprobarUrlQROpen() {
            const parametros = new URLSearchParams(window.location.search);
            const idQR = parametros.get('id');
            if (idQR) {
                const ext = baseDatos.find(e => e.id === idQR);
                if (ext) abrirFormulario(idQR);
            }
        }

        function renderizarLista() {
            const contenedor = document.getElementById('contenedor-extintores');
            contenedor.innerHTML = '';
            let listos = 0;

            baseDatos.forEach(ext => {
                if (ext.inspeccionado) listos++;

                const tarjeta = document.createElement('div');
                tarjeta.className = `p-4 rounded-xl shadow-xs border transition cursor-pointer flex items-center justify-between ${
                    ext.inspeccionado ? 'bg-green-50 border-green-200' : 'bg-white border-gray-200 hover:border-gray-300'
                }`;
                tarjeta.onclick = () => abrirFormulario(ext.id);

                tarjeta.innerHTML = `
                    <div class="space-y-0.5">
                        <div class="flex items-center gap-2">
                            <span class="text-base font-black ${ext.inspeccionado ? 'text-green-700' : 'text-gray-700'}">${ext.id}</span>
                            <span class="text-[10px] uppercase font-extrabold px-1.5 py-0.2 rounded-sm ${
                                ext.inspeccionado ? 'bg-green-200 text-green-800' : 'bg-amber-100 text-amber-800'
                            }">${ext.inspeccionado ? 'Controlado' : 'Pendiente'}</span>
                        </div>
                        <p class="text-xs text-gray-500 font-medium">${ext.ubicacion}</p>
                    </div>
                    <i data-lucide="${ext.inspeccionado ? 'check-circle-2' : 'chevron-right'}" class="w-5 h-5 ${ext.inspeccionado ? 'text-green-600' : 'text-gray-300'}"></i>
                `;
                contenedor.appendChild(tarjeta);
            });

            document.getElementById('contador-progreso').innerText = `${listos}/${baseDatos.length}`;
            lucide.createIcons();
        }

        function abrirFormulario(id) {
            idSeleccionado = id;
            const ext = baseDatos.find(e => e.id === id);

            document.getElementById('form-id').innerText = ext.id;
            document.getElementById('form-ubicacion').innerText = ext.ubicacion;
            document.getElementById('chk-manometro').checked = ext.manometro;
            document.getElementById('chk-precinto').checked = ext.precinto;
            document.getElementById('chk-manguera').checked = ext.manguera;
            document.getElementById('chk-acceso').checked = ext.acceso;
            document.getElementById('chk-tarjeta').checked = ext.tarjeta;
            document.getElementById('txt-observaciones').value = ext.observaciones || "";

            document.getElementById('vista-lista').classList.add('hidden');
            document.getElementById('vista-config').classList.add('hidden');
            document.getElementById('vista-formulario').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function volverALista() {
            if (window.location.search) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            document.getElementById('vista-formulario').classList.add('hidden');
            document.getElementById('vista-config').classList.add('hidden');
            document.getElementById('vista-lista').classList.remove('hidden');
        }

        function guardarInspeccion() {
            const ext = baseDatos.find(e => e.id === idSeleccionado);
            ext.manometro = document.getElementById('chk-manometro').checked;
            ext.precinto = document.getElementById('chk-precinto').checked;
            ext.manguera = document.getElementById('chk-manguera').checked;
            ext.acceso = document.getElementById('chk-acceso').checked;
            ext.tarjeta = document.getElementById('chk-tarjeta').checked;
            ext.observaciones = document.getElementById('txt-observaciones').value.trim();
            ext.inspeccionado = true;
            ext.fecha = new Date().toLocaleString('es-AR');

            localStorage.setItem(`inspecciones_${mesActualClave}`, JSON.stringify(baseDatos));
            alert(`¡Registro de Extintor ${idSeleccionado} guardado exitosamente!`);
            renderizarLista();
            volverALista();
        }

        function abrirConfiguracion() {
            document.getElementById('vista-lista').classList.add('hidden');
            document.getElementById('vista-formulario').classList.add('hidden');
            document.getElementById('vista-config').classList.remove('hidden');
            renderizarPanelQr();
        }

        function renderizarPanelQr() {
            const listaQr = document.getElementById('lista-descarga-qr');
            listaQr.innerHTML = '';

            baseDatos.forEach(ext => {
                const fila = document.createElement('div');
                fila.className = "flex items-center justify-between p-3 bg-white hover:bg-gray-50";
                fila.innerHTML = `
                    <div>
                        <span class="font-black text-sm text-gray-700">${ext.id}</span>
                        <p class="text-[11px] text-gray-400 truncate max-w-[200px]">${ext.ubicacion}</p>
                    </div>
                    <button onclick="descargarQrUnico('${ext.id}')" class="bg-gray-800 text-white p-2 rounded-lg hover:bg-red-600 transition flex items-center gap-1.5 text-xs font-semibold">
                        <i data-lucide="download" class="w-3.5 h-3.5"></i>
                    </button>
                `;
                listaQr.appendChild(fila);
            });
            lucide.createIcons();
        }

        // Toma automáticamente la URL real donde está alojada la web
        function descargarQrUnico(id) {
            const urlReal = window.location.origin + window.location.pathname;
            const contenedorTemp = document.getElementById('qr-oculto');
            contenedorTemp.innerHTML = '';

            new QRCode(contenedorTemp, { text: `${urlReal}?id=${id}`, width: 250, height: 250 });

            setTimeout(() => {
                const img = contenedorTemp.querySelector('img');
                if (img) {
                    const enlace = document.createElement('a');
                    enlace.download = `QR_${id}.png`;
                    enlace.href = img.src;
                    enlace.click();
                }
            }, 200);
        }

        // Descarga masiva en PDF sin romper la estética de la app
        function descargarTodosLosQrPDF() {
            const urlReal = window.location.origin + window.location.pathname;
            const panelPdf = document.getElementById('plantilla-pdf-impresion');
            panelPdf.innerHTML = '<h1 style="font-size:24px; font-weight:bold; color:#b91c1c; margin-bottom:20px; font-family:sans-serif;">Etiquetas de Relevamiento de Extintores</h1>';
            
            const grid = document.createElement('div');
            grid.style.display = 'grid';
            grid.style.gridTemplateColumns = 'repeat(2, 1fr)';
            grid.style.gap = '30px';
            grid.style.fontFamily = 'sans-serif';
            panelPdf.appendChild(grid);

            baseDatos.forEach(ext => {
                const item = document.createElement('div');
                item.style.border = '2px dashed #9ca3af';
                item.style.padding = '15px';
                item.style.borderRadius = '8px';
                item.style.display = 'flex';
                item.style.flexDirection = 'column';
                item.style.alignItems = 'center';
                item.style.backgroundColor = '#ffffff';
                
                const titulo = document.createElement('div');
                titulo.innerHTML = `<strong style="font-size:20px; color:#b91c1c;">EXTINTOR ${ext.id}</strong>`;
                item.appendChild(titulo);

                const qrDiv = document.createElement('div');
                qrDiv.style.margin = '10px 0';
                item.appendChild(qrDiv);
                
                new QRCode(qrDiv, { text: `${urlReal}?id=${ext.id}`, width: 140, height: 140 });

                const sub = document.createElement('div');
                sub.innerHTML = `<p style="font-size:11px; color:#4b5563; margin:0; max-width:250px; text-align:center;">${ext.ubicacion}</p><span style="font-size:9px; color:#9ca3af;">Escanee para registrar inspección</span>`;
                item.appendChild(sub);
                
                grid.appendChild(item);
            });

            panelPdf.classList.remove('hidden');

            const opciones = {
                margin: 10,
                filename: 'Planilla_Codigos_QR_Extintores.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opciones).from(panelPdf).save().then(() => {
                panelPdf.classList.add('hidden');
            });
        }

        function exportarExcel() {
            const filasExcel = baseDatos.map(ext => ({
                "ID Extintor": ext.id,
                "Ubicación": ext.ubicacion,
                "Relevado en el Mes": ext.inspeccionado ? "SÍ" : "NO PENDIENTE",
                "Fecha de Revisión": ext.fecha || "-",
                "1. Manómetro": ext.inspeccionado ? (ext.manometro ? "OK" : "RECHAZADO") : "-",
                "2. Precinto": ext.inspeccionado ? (ext.precinto ? "OK" : "RECHAZADO") : "-",
                "3. Manguera/Boquilla": ext.inspeccionado ? (ext.manguera ? "OK" : "RECHAZADO") : "-",
                "4. Acceso Despejado": ext.inspeccionado ? (ext.acceso ? "OK" : "RECHAZADO") : "-",
                "5. Tarjeta Vigente": ext.inspeccionado ? (ext.tarjeta ? "OK" : "RECHAZADO") : "-",
                "Observaciones Generales": ext.observaciones || "-"
            }));

            const hoja = XLSX.utils.json_to_sheet(filasExcel);
            const libro = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(libro, hoja, "Informe Relevamiento");
            XLSX.writeFile(libro, `Planilla_Extintores_${mesActualClave}.xlsx`);
        }
    </script>
</body>
</html>
